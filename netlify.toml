[build]
publish = "dist"
command = "pnpm run build"

[build.environment]
NODE_VERSION = "20"


[[redirects]]
from = "/api/album-webdav/*"
to = "/.netlify/functions/album-webdav/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/manifest.webmanifest"

[headers.values]
Content-Type = "application/manifest+json"
